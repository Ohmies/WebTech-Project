<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List - Personal Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <a class="skip-link" href="#main-content">ข้ามไปยังเนื้อหาหลัก</a>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="index.html">My Portfolio</a>
            <nav class="site-nav" aria-label="เมนูหลัก">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a class="active" href="project.html" aria-current="page">Project</a></li>
                    <li><a href="cv.html">CV</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content" class="container page-content">
        <section class="project-header">
            <h1>Project: To-Do List</h1>
            <p>แอปจัดการงานประจำวันด้วย JavaScript: เพิ่มงาน ทำเครื่องหมายว่าสำเร็จ ลบงาน และกรองรายการได้</p>
        </section>

        <section class="todo-app" aria-label="แอปจัดการงาน">
            <form id="todo-form" class="todo-form">
                <label for="todo-input">เพิ่มงานใหม่</label>
                <div class="todo-input-row">
                    <input id="todo-input" name="todo" type="text" placeholder="เช่น อ่านบทที่ 3" required maxlength="120">
                    <button type="submit">เพิ่ม</button>
                </div>
            </form>

            <div class="todo-controls" aria-label="ตัวกรองรายการ">
                <button type="button" class="filter-btn active" data-filter="all">ทั้งหมด</button>
                <button type="button" class="filter-btn" data-filter="active">ยังไม่เสร็จ</button>
                <button type="button" class="filter-btn" data-filter="completed">เสร็จแล้ว</button>
                <button type="button" id="clear-completed">ลบที่เสร็จแล้ว</button>
            </div>

            <p id="todo-status" aria-live="polite">ยังไม่มีงาน</p>
            <ul id="todo-list" class="todo-list" aria-label="รายการงาน"></ul>

            <noscript>
                <p>โปรดเปิดใช้งาน JavaScript เพื่อใช้งานฟังก์ชัน To-Do List</p>
            </noscript>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Personal Website Project</p>
        </div>
    </footer>
</body>
</html>
